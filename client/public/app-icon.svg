<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#243a6e"/>
      <stop offset="1" stop-color="#15244a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- "F" monogram, drawn as rects so it renders without any font dependency -->
  <g fill="#ffffff">
    <rect x="182" y="132" width="62" height="248" rx="8"/>
    <rect x="182" y="132" width="172" height="60" rx="8"/>
    <rect x="182" y="228" width="132" height="54" rx="8"/>
  </g>
  <!-- steel-blue brand accent -->
  <rect x="182" y="402" width="148" height="12" rx="6" fill="#6a9bd8"/>
</svg>
